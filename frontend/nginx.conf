# frontend/nginx.conf
# React 정적 파일 서빙 및 API 프록시 설정
# 단일 포트(80)로 프론트엔드 + 백엔드 API 모두 처리
# Tailscale VPN 등 외부 네트워크에서도 정상 작동

server {
    listen 80;
    server_name _;
    
    # React 빌드 파일 서빙
    root /usr/share/nginx/html;
    index index.html;

    # 정적 파일 캐싱
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 라우팅: 모든 경로를 index.html로 포워딩
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 API 프록시
    # REACT_APP_API_BASE_URL이 빈 문자열이면 모든 API 요청이 상대 경로(/api/...)로 전송됨
    # Nginx가 이 요청을 받아 Docker 내부의 backend:8000으로 프록시
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;

        # CORS 헤더 (외부 origin에서의 API 접근 허용)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

        # Preflight (OPTIONS) 요청 처리
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key" always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
    }
}
