version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: laions_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-laions_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-laions_password}
      POSTGRES_DB: ${DB_NAME:-laions_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-laions_user} -d ${DB_NAME:-laions_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laions_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-laions_user}:${DB_PASSWORD:-laions_password}@db:5432/${DB_NAME:-laions_db}
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE_URL=${REACT_APP_API_BASE_URL:-http://localhost:8001}
        - REACT_APP_SUPABASE_URL=${REACT_APP_SUPABASE_URL}
        - REACT_APP_SUPABASE_ANON_KEY=${REACT_APP_SUPABASE_ANON_KEY}
    container_name: laions_frontend
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "3000:80"

volumes:
  postgres_data:
