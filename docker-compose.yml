version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laions_backend
    env_file:
      - .env
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 빈 문자열로 설정 → apiClient가 상대 경로(/api/...)로 요청
        # Nginx가 /api/ 요청을 backend:8000으로 프록시 처리
        - REACT_APP_API_BASE_URL=${REACT_APP_API_BASE_URL:-}
        - REACT_APP_SUPABASE_URL=${REACT_APP_SUPABASE_URL}
        - REACT_APP_SUPABASE_ANON_KEY=${REACT_APP_SUPABASE_ANON_KEY}
    container_name: laions_frontend
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:80"
